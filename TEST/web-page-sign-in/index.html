<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suraj Creatives</title>

    <style>
       
        body {
            margin: 0;
            padding: 0;
        }

       
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

       
        .bg {
            height: 500px;
            width: 900px;
            border-radius: 50px;
            background-image: url('../images/orange-template.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        
        .container-inside {
            display: flex;
            justify-content: center;
            align-items: center;
        }

       
        .main {
            height: 450px;
            width: 850px;
            border-radius: 50px;
            object-fit: cover;
        }


        .logo {
            position: absolute;
            top: 180px;
            left: 350px;
        }


        .log {
            height: 100px;
            width: 100px;
            border-radius: 50%;
            object-fit: cover;
        }


        .sign-in {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #266bff;
            color: rgb(255, 255, 255);
            cursor: pointer;
            position:absolute;
            top: 500px;
            left: 1050px;
        }


        .checkbox[type="text"] {
            position: absolute;
            top: 280px;
            left: 750px;
            width: 280px;
            height: 45px;
            padding: 12px 16px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background-color: #f8f9fa;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: all 0.3s ease;
        }

        .checkbox[type="text"]:focus {
            outline: none;
            border-color: #266bff;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(38, 107, 255, 0.1);
        }

        .checkbox[type="text"]::placeholder {
            color: #999;
        }

        #username {
            position: absolute;
            top: -20px;
            left: 40px;
        }


    </style>
</head>
<body>
>
   
    <div class="container">
        
        <div class="bg">
            
            <div class="container-inside">
                <img src="../images/blue-vector-template.jpg" alt="Blue digital vector background with flowing shapes in a modern hero panel" class="main">

                <div class="logo">
                    
                    <img src="../images/channels4_profile.jpg" alt="Profile picture" class="log">

                </div>


            </div>
        </div>
    </div>
    

    <button class="sign-in">Sign In</button>

    <div id="username">
        <input class="checkbox" type="text" placeholder="Username / Gmail / Phone number">
    </div>



</body>
</html>
